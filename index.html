<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KENSEI ENGINE - FULL PLATFORM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // MÀY DÁN CONFIG VÀO ĐÂY
        const firebaseConfig = { /* DÁN CONFIG VÀO ĐÂY */ };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth();
        window.db = getFirestore();
        window.provider = new GoogleAuthProvider();
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;
    </script>
</head>
<body class="bg-[#0b0f19] text-white">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#0b0f19] flex items-center justify-center">
        <button onclick="authLogin()" class="bg-blue-600 px-10 py-4 rounded-xl font-bold hover:scale-105 transition">LOGIN VỚI GOOGLE</button>
    </div>

    <div id="main-app" class="hidden max-w-5xl mx-auto p-6 space-y-8">
        <div class="flex gap-8 border-b border-gray-800 pb-4">
            <button onclick="switchTab('gen')">TẠO ẢNH</button>
            <button onclick="switchTab('lib')">THƯ VIỆN 15 SLOTS</button>
            <button onclick="userLogout()">ĐĂNG XUẤT</button>
        </div>

        <div id="gen" class="tab-pane">
            <input type="url" id="api-url" placeholder="URL Colab LocalTunnel..." class="w-full bg-gray-900 p-3 rounded mb-4 border border-gray-700">
            <textarea id="prompt" class="w-full bg-gray-900 p-4 rounded mb-4" placeholder="Nhập prompt..."></textarea>
            <button onclick="runGeneration()" class="w-full bg-purple-600 py-3 rounded font-bold">⚡ KHỞI TẠO & LƯU VÀO SLOT</button>
            <div id="result" class="mt-6 border border-dashed border-gray-700 h-64 flex items-center justify-center">Chờ ảnh...</div>
        </div>

        <div id="lib" class="tab-pane hidden grid grid-cols-5 gap-4">
            <script>for(let i=1; i<=15; i++) document.write(`<div class="aspect-square bg-gray-800 border border-gray-700 flex items-center justify-center text-xs">Slot ${i}</div>`);</script>
        </div>
    </div>

    <script>
        // LOGIC AUTH
        async function authLogin() {
            const result = await signInWithPopup(auth, provider);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        // LOGIC GENERATE & SAVE (ĐÂY LÀ CHỖ KẾT NỐI BACKEND)
        async function runGeneration() {
            const url = document.getElementById('api-url').value;
            const prompt = document.getElementById('prompt').value;
            
            // 1. Gửi lên Colab
            const res = await fetch(`${url}/generate`, { method: 'POST', body: JSON.stringify({prompt}) });
            const blob = await res.blob();
            
            // 2. Lưu link ảnh vào Firestore (Lưu vào 1 trong 15 slots)
            const user = auth.currentUser;
            await setDoc(doc(db, "users", user.uid, "gallery", "slot1"), { url: "link_anh_sau_khi_up_len_storage" });
            alert("Đã lưu vào thư viện!");
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function userLogout() { signOut(auth).then(() => location.reload()); }
    </script>
</body>
</html>
