<body class="bg-[#0b0f19] text-white">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#0b0f19] flex items-center justify-center">

    <div id="main-app" class="hidden max-w-5xl mx-auto p-6 space-y-8">
        <div class="flex gap-8 border-b border-gray-800 pb-4">
            <button onclick="switchTab('gen')" class="hover:text-purple-400">TẠO ẢNH</button>
            <button onclick="switchTab('lib')" class="hover:text-purple-400">THƯ VIỆN 15 SLOTS</button>
            <button onclick="userLogout()" class="text-red-500">ĐĂNG XUẤT</button>

        <div id="gen" class="tab-pane">

            <textarea id="prompt" class="w-full bg-gray-900 p-4 rounded mb-4" placeholder="Nhập prompt..."></textarea>
            <button onclick="runGeneration()" class="w-full bg-purple-600 py-3 rounded font-bold hover:bg-purple-500">⚡ KHỞI TẠO & LƯU VÀO SLOT</button>
            <div id="result" class="mt-6 border border-dashed border-gray-700 h-64 flex items-center justify-center">Chờ ảnh...</div>
        </div>

        <div id="lib" class="tab-pane hidden grid grid-cols-5 gap-4">
            <script>for(let i=1; i<=15; i++) document.write(`<div class="aspect-square bg-gray-800 border border-gray-700 flex items-center justify-center text-xs">Slot ${i}</div>`);</script>
        </div>
    </div>

            // Hiện tại đã kết nối được tới Firebase Firestore
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function userLogout() { signOut(auth).then(() => location.reload()); }
    </script>
</body>
</html>
