<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO AI V2 - KENSEI ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .kensei-panel { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid #374151; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        .btn-glow { transition: all 0.3s ease; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .btn-glow:hover { box-shadow: 0 0 15px #8b5cf6; transform: translateY(-1px); }
    </style>
</head>
<body>

    <!-- MÀN HÌNH LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#0b0f19] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 bg-[#151926] rounded-xl border border-gray-800 shadow-2xl">
            <h1 class="text-2xl font-bold text-center mb-8 text-white uppercase tracking-widest">STUDIO AI V2</h1>
            <div class="space-y-3">
                <button class="w-full py-3 bg-[#1e2536] hover:bg-[#2a3447] rounded-lg font-medium transition">Continue with Google</button>
                <button class="w-full py-3 bg-[#1e2536] hover:bg-[#2a3447] rounded-lg font-medium transition">Continue with Apple</button>
            </div>
            <div class="my-6 flex items-center text-[#4a5568]">
                <div class="flex-1 border-t border-[#2d3748]"></div>
                <span class="px-4 text-sm uppercase">Or</span>
                <div class="flex-1 border-t border-[#2d3748]"></div>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-3 bg-[#0b0f19] border border-[#2d3748] rounded-lg focus:outline-none focus:border-purple-500">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 bg-[#0b0f19] border border-[#2d3748] rounded-lg focus:outline-none focus:border-purple-500">
            </div>
            <button onclick="checkLogin()" class="w-full mt-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-bold transition uppercase">Continue</button>
            <p id="login-error" class="text-red-500 text-xs mt-2 hidden text-center">Sai thông tin đăng nhập!</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden flex flex-col items-center justify-start min-h-screen p-4 space-y-6 relative">
        <div class="absolute top-4 right-4 z-50">
            <button onclick="toggleSettings()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-3 py-2 rounded-xl border border-gray-600 text-sm font-medium transition shadow-lg">⚙️ Cài đặt</button>
            <div id="settings-menu" class="hidden absolute right-0 mt-2 w-72 bg-gray-900 border border-gray-700 rounded-xl p-3 shadow-2xl">
                <div class="flex items-center gap-3 p-2 border-b border-gray-800 mb-2">
                    <div class="relative w-12 h-12">
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=Guest&background=random" class="w-full h-full rounded-full border-2 border-gray-700">
                        <button class="absolute -bottom-1 -right-1 bg-gray-800 p-1 rounded-full border border-gray-600 text-[10px]">📸</button>
                    </div>
                    <div class="text-xs">
                        <p id="user-email" class="text-gray-200">Guest User</p>
                        <p class="text-red-500 italic font-bold">Đã xác thực</p>
                    </div>
                </div>
                <div class="p-2">
                    <label class="text-[10px] font-semibold text-gray-400">API LINK:</label>
                    <input type="url" id="api-link" placeholder="https://xxxx.loca.lt" class="w-full bg-gray-950 border border-gray-800 rounded px-2 py-1 text-xs text-gray-300">
                </div>
            </div>
        </div>

        <div class="w-full max-w-2xl kensei-panel rounded-2xl p-6 space-y-6 mt-12">
            <h1 class="text-3xl font-extrabold text-center tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">STUDIO AI V2 - KENSEI ENGINE</h1>
            <select id="image-style" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-gray-100">
                <option value="PHOTOREALISTIC">Photorealistic (Ảnh tả thực, 8k)</option>
            </select>
            <textarea id="prompt" rows="3" placeholder="Nhập ý tưởng tại đây..." class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100"></textarea>
            <button onclick="generateImage()" class="w-full btn-glow text-white font-bold py-3 rounded-xl uppercase text-sm">⚡ Khởi tạo hình ảnh</button>
            <div id="result-container" class="border-2 border-dashed border-gray-700 rounded-2xl min-h-[250px] flex items-center justify-center bg-gray-950">
                 <span id="placeholder-text" class="text-sm text-gray-500">Đang chờ lệnh...</span>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            if (document.getElementById('login-email').value === "admin@kensei.com" && document.getElementById('login-pass').value === "123456") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-email').innerText = document.getElementById('login-email').value;
            } else { alert("Thông tin sai!"); }
        }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('hidden'); }
        async function generateImage() {
            const apiLink = document.getElementById('api-link').value;
            if (!apiLink) { alert("Thiếu link API!"); return; }
            alert("Đang gửi lệnh tới: " + apiLink);
        }
    </script>
</body>
</html>
